<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solar Pro Investment Calculator</title>

<style>
body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; background: #edf4fa; color: #333; }
.box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,.1); }
h2 { color: #0a67c1; text-align: center; margin-top: 0; }
input, select { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
label { display: block; margin-top: 15px; font-weight: 600; color: #555; }
button { width: 100%; margin-top: 25px; padding: 15px; background: #0a67c1; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
.result { margin-top: 25px; background: #f0f7ff; padding: 20px; border-radius: 12px; border-left: 5px solid #0a67c1; }
.result div { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dotted #ccc; }
.result b { color: #d32f2f; }
.hidden { display: none; }
.contact-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
.contact { display: flex; align-items: center; justify-content: center; padding: 14px; border-radius: 10px; text-decoration: none; font-weight: bold; color: white; }
.btn-tel { background: #18a957; }
.btn-zalo { background: #0068ff; }
</style>
</head>

<body>

<div class="box">
<h2>⚡ Solar Hybrid Calculator</h2>

<label>Loại khách hàng</label>
<select id="type" onchange="toggleMode()">
<option value="res">Hộ gia đình</option>
<option value="biz">Kinh doanh 3 giá</option>
</select>

<div id="resBlock">
<label>Điện tiêu thụ (kWh/tháng)</label>
<input type="number" id="reskwh" value="1800">
</div>

<div id="bizBlock" class="hidden">
<label>kWh cao điểm</label>
<input type="number" id="peak" value="500">
<label>kWh bình thường</label>
<input type="number" id="normal" value="1000">
<label>kWh thấp điểm</label>
<input type="number" id="offpeak" value="500">
</div>

<label>Chi phí Hybrid (VNĐ/kWp)</label>
<input type="number" id="kwcost_input" value="10000000">

<label>Tỷ lệ tự dùng (%)</label>
<input type="number" id="selfuse_input" value="80">

<label>Pin lưu trữ (kWh)</label>
<select id="battery_select">
<option value="10">10</option>
<option value="20" selected>20</option>
<option value="30">30</option>
</select>

<button onclick="calc()">TÍNH TOÁN</button>

<div class="result">
<div>Tiền điện: <b id="res_bill"></b></div>
<div>Công suất: <b id="res_kwp"></b></div>
<div>Tổng đầu tư: <b id="res_total"></b></div>
<div>Hoàn vốn: <b id="res_payback"></b></div>
<div>IRR: <b id="res_irr"></b></div>
<div>NPV (25 năm): <b id="res_npv"></b></div>
<div>Tiết kiệm năm: <b id="res_save_year"></b></div>
<div>Hiệu suất năm 25: <b id="res_degrade"></b></div>
</div>

<div class="contact-group">
<a class="contact btn-tel" href="tel:0838933638">📞 Gọi</a>
<a class="contact btn-zalo" href="https://zalo.me/0838933638">💬 Zalo</a>
</div>

</div>

<script>

function vnd(x){
return Math.round(x).toLocaleString("vi-VN")+" đ";
}

function toggleMode(){
let t=document.getElementById("type").value;
document.getElementById("resBlock").classList.toggle("hidden", t!="res");
document.getElementById("bizBlock").classList.toggle("hidden", t!="biz");
}

function residentialBill(kwh){
let tiers=[1893,1956,2271,2860,3197,3302];
let use=[50,50,100,100,100,999999];
let cost=0;
for(let i=0;i<tiers.length;i++){
let take=Math.min(kwh,use[i]);
cost+=take*tiers[i];
kwh-=take;
if(kwh<=0) break;
}
return cost*1.08;
}

function businessBill(){
let p=parseFloat(peak.value)||0;
let n=parseFloat(normal.value)||0;
let o=parseFloat(offpeak.value)||0;
return (p*3170+n*1860+o*1200)*1.08;
}

/* IRR chuẩn hơn */
function calcIRR(invest, cashflow, years=25){
let irr=0.1;
for(let i=0;i<100;i++){
let npv=0;
for(let y=1;y<=years;y++){
npv+=cashflow/Math.pow(1+irr,y);
}
npv-=invest;
irr=irr-npv/1000000000;
}
return (irr*100).toFixed(1);
}

function calc(){

let type=type.value;
let kwh=0,bill=0;

if(type=="res"){
kwh=parseFloat(reskwh.value)||0;
bill=residentialBill(kwh);
}else{
kwh=(parseFloat(peak.value)||0)+(parseFloat(normal.value)||0)+(parseFloat(offpeak.value)||0);
bill=businessBill();
}

let kwp=kwh/125;

let cost=parseFloat(kwcost_input.value)||0;
let selfuse=parseFloat(selfuse_input.value)/100||0;
let battery=parseFloat(battery_select.value)||0;

let invest=kwp*cost + battery*7000000;

let annual=bill*selfuse*12;

let payback=annual>0?invest/annual:0;

/* NPV có suy giảm */
let npvVal=-invest;
for(let y=1;y<=25;y++){
let degrade=Math.pow(1-0.0055,y);
let cash=annual*degrade;
npvVal+=cash/Math.pow(1.08,y);
}

let irr=calcIRR(invest,annual);

res_bill.innerText=vnd(bill);
res_kwp.innerText=kwp.toFixed(2)+" kWp";
res_total.innerText=vnd(invest);
res_payback.innerText=payback.toFixed(1)+" năm";
res_irr.innerText=irr+" %";
res_npv.innerText=vnd(npvVal);
res_save_year.innerText=vnd(annual);
res_degrade.innerText=(100-(0.55*25)).toFixed(1)+"%";

}

window.onload=calc;

</script>

</body>
</html>
